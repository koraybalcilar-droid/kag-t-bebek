<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nostaljik Kağıt Bebek AI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #111;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            position: relative;
            flex: 1;
            width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .camera-status {
            position: absolute;
            z-index: 5;
            color: #fff;
            font-size: 15px;
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            border-radius: 10px;
            margin: 0 20px;
        }
        .mask-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .controls {
            background: #191919;
            padding: 20px 20px 40px 20px;
            z-index: 3;
            border-top: 2px solid #333;
            color: white;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .control-group label {
            font-size: 14px;
            width: 100px;
            color: #ccc;
        }
        .control-group input {
            flex: 1;
            margin-left: 10px;
            accent-color: #ff4757;
            height: 25px;
        }
        .title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ff4757;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="camera-status" id="statusMessage">Kamera izni bekleniyor...<br>Lütfen ekranda izin uyarısı çıkarsa onaylayın.</div>
        <video id="camera" autoplay playsinline muted></video>
        
        <svg class="mask-overlay" id="mask" viewBox="0 0 400 600" preserveAspectRatio="xMidYMid slice" xmlns="http://w3.org">
            <defs>
                <mask id="dress-mask">
                    <rect width="100%" height="100%" fill="white" />
                    <path d="M160,220 L240,220 L260,280 L290,450 L110,450 L140,280 Z" fill="black" />
                    <circle cx="200" cy="140" r="25" fill="white"/>
                    <path d="M160,170 Q200,190 240,170 L240,220 L160,220 Z" fill="white" />
                </mask>
            </defs>
            <rect width="100%" height="100%" fill="#f5f6fa" mask="url(#dress-mask)" />
            <path d="M160,220 L240,220 L260,280 L290,450 L110,450 L140,280 Z" fill="none" stroke="#333" stroke-width="3" />
            <circle cx="200" cy="140" r="25" fill="none" stroke="#333" stroke-width="3"/>
        </svg>
    </div>

    <div class="controls">
        <div class="title">KAĞIT BEBEK STÜDYOSU</div>
        
        <div class="control-group">
            <label>Parlaklık</label>
            <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Kontrast</label>
            <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <label>Retro (Sepia)</label>
            <input type="range" id="retro" min="0" max="1" step="0.1" value="0">
        </div>
    </div>

    <script>
        const video = document.getElementById('camera');
        const statusMessage = document.getElementById('statusMessage');
        const brightnessInput = document.getElementById('brightness');
        const contrastInput = document.getElementById('contrast');
        const retroInput = document.getElementById('retro');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: "environment" }
                });
                video.srcObject = stream;
                statusMessage.style.display = 'none';
            } catch (err) {
                console.error(err);
                statusMessage.innerHTML = "Güvenli bağlantı (HTTPS) veya tarayıcı kısıtlaması nedeniyle kamera açılamadı. Lütfen bu kodu yerel sunucuda veya GitHub Pages üzerinde test edin.";
            }
        }

        function updateFilters() {
            video.style.filter = `brightness(${brightnessInput.value}) contrast(${contrastInput.value}) sepia(${retroInput.value})`;
        }

        brightnessInput.addEventListener('input', updateFilters);
        contrastInput.addEventListener('input', updateFilters);
        retroInput.addEventListener('input', updateFilters);

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
