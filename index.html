<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kağıt Bebek AI Studio v2.3</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .workspace {
            position: relative;
            flex: 1;
            width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }
        .status-toast {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 71, 87, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            text-align: center;
            margin: 0 15px;
        }
        .controls {
            background: #1e1e1e;
            padding: 15px 20px 60px 20px;
            z-index: 5;
            border-top: 1px solid #333;
            color: white;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        .title-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #ff4757;
            letter-spacing: 0.5px;
        }
        .btn-action {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
            transition: all 0.2s;
        }
        .btn-action:active {
            transform: scale(0.95);
            background: #ff6b81;
        }
        .btn-reset {
            background: #333;
            box-shadow: none;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .control-group label {
            font-size: 13px;
            width: 95px;
            color: #aaa;
        }
        .control-group input {
            flex: 1;
            margin-left: 10px;
            accent-color: #ff4757;
            height: 25px;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="status-toast" id="toast">Adım 1: Fotoğraf Çekin</div>
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="title-area">
            <div class="title">KAĞIT BEBEK AI v2.3</div>
            <button class="btn-action" id="actionBtn">FOTOĞRAF ÇEK</button>
        </div>
        
        <div class="control-group">
            <label>AI Hassasiyet</label>
            <input type="range" id="tolerance" min="10" max="100" step="1" value="40">
        </div>
        <div class="control-group">
            <label>Parlaklık</label>
            <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Kontrast</label>
            <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Retro Efekt</label>
            <input type="range" id="retro" min="0" max="1" step="0.1" value="0">
        </div>
    </div>
    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const actionBtn = document.getElementById('actionBtn');
        const toast = document.getElementById('toast');
        const toleranceInput = document.getElementById('tolerance');
        
        const brightnessInput = document.getElementById('brightness');
        const contrastInput = document.getElementById('contrast');
        const retroInput = document.getElementById('retro');

        let isPhotoTaken = false;
        let isDrawing = false;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1920 } }
                });
                video.srcObject = stream;
            } catch (err) {
                toast.innerText = "Kamera Başlatılamadı!";
            }
        }

        function handleSelection(clientX, clientY) {
            if (!isPhotoTaken) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = Math.floor((clientX - rect.left) * (canvas.width / rect.width));
            const clickY = Math.floor((clientY - rect.top) * (canvas.height / rect.height));

            if (clickX < 0 || clickX >= canvas.width || clickY < 0 || clickY >= canvas.height) return;

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = canvas.width;
            const height = canvas.height;
            
            const targetIdx = (clickY * width + clickX) * 4;
            const targetR = data[targetIdx];
            const targetG = data[targetIdx + 1];
            const targetB = data[targetIdx + 2];

            // Eğer tıklanan yer zaten silinmişse işlem yapma
            if (data[targetIdx + 3] === 0) return;

            const tolerance = parseInt(toleranceInput.value);
            const visited = new Uint8Array(width * height);
            
            const queue = [clickX, clickY];
            let head = 0;

            while (head < queue.length) {
                const x = queue[head++];
                const y = queue[head++];

                if (x < 0 || x >= width || y < 0 || y >= height) continue;
                
                const pos = y * width + x;
                if (visited[pos]) continue;
                visited[pos] = 1;

                const idx = pos * 4;
                if (data[idx + 3] === 0) continue;

                const r = data[idx];
                const g = data[idx + 1];
                const b = data[idx + 2];

                const rDiff = r - targetR;
                const gDiff = g - targetG;
                const bDiff = b - targetB;
                
                const meanR = (targetR + r) / 2;
                const distance = Math.sqrt((2 + meanR/256) * rDiff * rDiff + 4 * gDiff * gDiff + (2 + (255-meanR)/256) * bDiff * bDiff);

                if (distance < tolerance) {
                    data[idx + 3] = 0; 
                    
                    if (x + 1 < width && !visited[pos + 1]) queue.push(x + 1, y);
                    if (x - 1 >= 0 && !visited[pos - 1]) queue.push(x - 1, y);
                    if (y + 1 < height && !visited[pos + width]) queue.push(x, y + 1);
                    if (y - 1 >= 0 && !visited[pos - width]) queue.push(x, y - 1);
                }
            }

            ctx.putImageData(imgData, 0, 0);
        }

        // Fare Etkinlikleri (Bilgisayar Testleri İçin)
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; handleSelection(e.clientX, e.clientY); });
        canvas.addEventListener('mousemove', (e) => { if (isDrawing) handleSelection(e.clientX, e.clientY); });
        window.addEventListener('mouseup', () => isDrawing = false);

        // Dokunma Etkinlikleri (Telefon İçin Sürükleyerek Silme)
        canvas.addEventListener('touchstart', (e) => { 
            isDrawing = true; 
            if(e.touches.length > 0) handleSelection(e.touches[0].clientX, e.touches[0].clientY); 
        });
        canvas.addEventListener('touchmove', (e) => { 
            if (isDrawing && e.touches.length > 0) handleSelection(e.touches[0].clientX, e.touches[0].clientY); 
        });
        window.addEventListener('touchend', () => isDrawing = false);

        actionBtn.addEventListener('click', () => {
            if (!isPhotoTaken) {
                canvas.width = video.videoWidth || canvas.clientWidth;
                canvas.height = video.videoHeight || canvas.clientHeight;
                
                ctx.filter = "blur(1px)"; 
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.filter = "none"; 
                
                isPhotoTaken = true;
                actionBtn.innerText = "YENİDEN ÇEK";
                actionBtn.classList.add('btn-reset');
                toast.innerText = "Parmağınızı kıyafet üzerinde SÜRÜKLEYEREK silin!";
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                isPhotoTaken = false;
                actionBtn.innerText = "FOTOĞRAF ÇEK";
                actionBtn.classList.remove('btn-reset');
                toast.innerText = "Adım 1: Modeli Karşıya Doğrultup Fotoğraf Çekin";
            }
        });

        function applyLiveFilters() {
            video.style.filter = `brightness(${brightnessInput.value}) contrast(${contrastInput.value}) sepia(${retroInput.value})`;
        }

        brightnessInput.addEventListener('input', applyLiveFilters);
        contrastInput.addEventListener('input', applyLiveFilters);
        retroInput.addEventListener('input', applyLiveFilters);

        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
