<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kağıt Bebek AI Studio</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: #121212;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .workspace {
            position: relative;
            flex: 1;
            width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
            cursor: crosshair;
        }
        .status-toast {
            position: absolute;
            top: 20px;
            z-index: 10;
            background: rgba(255, 71, 87, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none;
            text-align: center;
        }
        .controls {
            background: #1e1e1e;
            padding: 15px 20px 30px 20px;
            z-index: 5;
            border-top: 1px solid #333;
            color: white;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
        }
        .title-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .title {
            font-size: 16px;
            font-weight: bold;
            color: #ff4757;
            letter-spacing: 0.5px;
        }
        .btn-action {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.4);
            transition: all 0.2s;
        }
        .btn-action:active {
            transform: scale(0.95);
            background: #ff6b81;
        }
        .btn-reset {
            background: #333;
            box-shadow: none;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .control-group label {
            font-size: 13px;
            width: 90px;
            color: #aaa;
        }
        .control-group input {
            flex: 1;
            margin-left: 10px;
            accent-color: #ff4757;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="workspace">
        <div class="status-toast" id="toast">Adım 1: Modeli Karşıya Doğrultup Fotoğraf Çekin</div>
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="title-area">
            <div class="title">KAĞIT BEBEK AI v2.0</div>
            <button class="btn-action" id="actionBtn">FOTOĞRAF ÇEK</button>
        </div>
        
        <div class="control-group">
            <label>AI Hassasiyet</label>
            <input type="range" id="tolerance" min="10" max="80" step="1" value="35">
        </div>
        <div class="control-group">
            <label>Parlaklık</label>
            <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Kontrast</label>
            <input type="range" id="contrast" min="0.5" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label>Retro Efekt</label>
            <input type="range" id="retro" min="0" max="1" step="0.1" value="0">
        </div>
    </div>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const actionBtn = document.getElementById('actionBtn');
        const toast = document.getElementById('toast');
        const toleranceInput = document.getElementById('tolerance');
        
        const brightnessInput = document.getElementById('brightness');
        const contrastInput = document.getElementById('contrast');
        const retroInput = document.getElementById('retro');

        let isPhotoTaken = false;
        let originalPhotoData = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: false,
                    video: { facingMode: "environment", width: { ideal: 1080 }, height: { ideal: 1920 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    resizeCanvas();
                };
            } catch (err) {
                toast.innerText = "Kamera Başlatılamadı! Lütfen HTTPS bağlantısını kontrol edin.";
            }
        }

        function resizeCanvas() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        actionBtn.addEventListener('click', () => {
            if (!isPhotoTaken) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                originalPhotoData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                isPhotoTaken = true;
                actionBtn.innerText = "YENİDEN ÇEK";
                actionBtn.classList.add('btn-reset');
                toast.innerText = "Adım 2: Değiştirmek istediğin kıyafete DOKUN!";
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                isPhotoTaken = false;
                actionBtn.innerText = "FOTOĞRAF ÇEK";
                actionBtn.classList.remove('btn-reset');
                toast.innerText = "Adım 1: Modeli Karşıya Doğrultup Fotoğraf Çekin";
            }
        });

        canvas.addEventListener('click', (e) => {
            if (!isPhotoTaken) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = Math.floor((e.clientX - rect.left) * (canvas.width / rect.width));
            const clickY = Math.floor((e.clientY - rect.top) * (canvas.height / rect.height));

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            
            const targetIdx = (clickY * canvas.width + clickX) * 4;
            const targetR = data[targetIdx];
            const targetG = data[targetIdx + 1];
            const targetB = data[targetIdx + 2];

            const tolerance = parseInt(toleranceInput.value);
            const visited = new Uint8Array(canvas.width * canvas.height);
            const queue = [[clickX, clickY]];
            
            while(queue.length > 0) {
                const [x, y] = queue.shift();
                if(x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
                
                const idx = (y * canvas.width + x) * 4;
                if(visited[y * canvas.width + x]) continue;
                visited[y * canvas.width + x] = 1;

                const r = data[idx];
                const g = data[idx+1];
                const b = data[idx+2];

                const distance = Math.sqrt(
                    Math.pow(r - targetR, 2) + 
                    Math.pow(g - targetG, 2) + 
                    Math.pow(b - targetB, 2)
                );

                if(distance < tolerance) {
                    data[idx + 3] = 0; 
                    queue.push([x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]);
                }
            }

            ctx.putImageData(imgData, 0, 0);
            toast.innerText = "Harika! Şimdi telefonu etraftaki desenlere tutarak kombini değiştir.";
        });

        function applyLiveFilters() {
            video.style.filter = `brightness(${brightnessInput.value}) contrast(${contrastInput.value}) sepia(${retroInput.value})`;
        }

        brightnessInput.addEventListener('input', applyLiveFilters);
        contrastInput.addEventListener('input', applyLiveFilters);
        retroInput.addEventListener('input', applyLiveFilters);

        window.addEventListener('load', initCamera);
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
</html>
